name: 策划案需求
description: 提一个策划文档需求（推荐由「立项」skill 引导生成，也可手填）
title: "[策划案] "
labels: ["策划案", "待处理"]
body:
  - type: markdown
    attributes:
      value: |
        ## 策划案需求登记
        填得越清楚，AI 出稿越准。这一步就是流程的「第 0 环」——立项。
  - type: textarea
    id: background
    attributes:
      label: 背景 / 要解决的问题
      description: 为什么需要这份策划案？
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 目标 / 预期产出
      description: 这份文档要达成什么？需覆盖哪些内容？
    validations:
      required: true
  - type: input
    id: knowledge-refs
    attributes:
      label: 关联知识库条目
      description: 需要参考 knowledge/ 下的哪些设定 / 规范？（填路径或关键词）
  - type: input
    id: milestone
    attributes:
      label: 目标里程碑 / deadline
      description: 挂到哪个版本？什么时候要？
  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - P0 紧急
        - P1 高
        - P2 中
        - P3 低
    validations:
      required: true
